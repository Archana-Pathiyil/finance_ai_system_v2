<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Finance AI MIS System</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#F0F2F5;color:#1A2332;min-height:100vh;display:flex}

/* Sidebar */
#sidebar{width:230px;background:#1D3557;border-right:none;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;box-shadow:2px 0 8px rgba(0,0,0,.12)}
.logo{padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.logo-title{font-size:15px;font-weight:700;color:#FFFFFF;display:flex;align-items:center;gap:8px}
.logo-icon{background:linear-gradient(135deg,#457B9D,#A8DADC);border-radius:8px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:14px}
.logo-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:3px}
nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-section{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.4);padding:14px 8px 5px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;color:rgba(255,255,255,.65);transition:all .15s;margin-bottom:1px}
.nav-item:hover{background:rgba(255,255,255,.1);color:#FFFFFF}
.nav-item.active{background:rgba(255,255,255,.15);color:#FFFFFF;border-left:3px solid #A8DADC;margin-left:-2px}
.nav-icon{font-size:15px;width:18px;text-align:center}
.sidebar-foot{padding:12px 14px;border-top:1px solid rgba(255,255,255,.1);font-size:11px;color:rgba(255,255,255,.4)}

/* Main */
#main{margin-left:230px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:56px;background:#FFFFFF;border-bottom:1px solid #E2E8F0;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.topbar-title{font-size:14px;font-weight:700;color:#1A2332}
.topbar-sub{font-size:11px;color:#64748B;margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:10px}
.avatar{width:32px;height:32px;background:linear-gradient(135deg,#1D3557,#457B9D);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.content{padding:24px;flex:1}

/* Pages */
.page{display:none}
.page.active{display:block}

/* KPI Grid */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px}
.kpi-card{background:#FFFFFF;border:1px solid #E2E8F0;border-radius:10px;padding:18px;position:relative;overflow:hidden;border-top:3px solid var(--c,#457B9D);box-shadow:0 1px 4px rgba(0,0,0,.05)}
.kpi-label{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#64748B;margin-bottom:8px}
.kpi-value{font-size:20px;font-weight:700;color:#1A2332;font-family:'Courier New',monospace}
.kpi-icon{position:absolute;top:14px;right:14px;font-size:20px;opacity:.12}

/* Card */
.card{background:#FFFFFF;border:1px solid #E2E8F0;border-radius:10px;padding:18px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.card-title{font-size:13px;font-weight:600;margin-bottom:14px;color:#1A2332}
.card-row{display:flex;gap:14px;margin-bottom:16px}
.card-row .card{flex:1;margin-bottom:0}

/* Table */
.tbl-wrap{background:#FFFFFF;border:1px solid #E2E8F0;border-radius:10px;overflow:hidden;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.tbl-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #E2E8F0;background:#FAFBFC}
.tbl-title{font-size:13px;font-weight:600;color:#1A2332}
table{width:100%;border-collapse:collapse}
th{background:#F8FAFC;padding:9px 14px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#64748B;border-bottom:1px solid #E2E8F0}
td{padding:10px 14px;font-size:12.5px;color:#374151;border-bottom:1px solid #F1F5F9}
tr:last-child td{border-bottom:none}
tr:hover td{background:#F8FAFC;color:#1A2332}
.mono{font-family:'Courier New',monospace;font-size:12px}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.04em}
.badge-green{background:#DCFCE7;color:#15803D}
.badge-red{background:#FEE2E2;color:#DC2626}
.badge-amber{background:#FEF3C7;color:#D97706}
.badge-blue{background:#DBEAFE;color:#1D4ED8}
.badge-purple{background:#EDE9FE;color:#7C3AED}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;transition:all .15s}
.btn-primary{background:#16A34A;color:#fff}
.btn-primary:hover{background:#15803D}
.btn-outline{background:#fff;border:1px solid #CBD5E1;color:#475569}
.btn-outline:hover{border-color:#457B9D;color:#457B9D}
.btn-blue{background:#1D4ED8;color:#fff}
.btn-blue:hover{background:#1E40AF}
.btn-sm{padding:5px 10px;font-size:11px}

/* Tabs */
.tabs{display:flex;gap:3px;background:#E2E8F0;border-radius:8px;padding:3px;margin-bottom:16px;width:fit-content}
.tab{padding:6px 16px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;color:#64748B;transition:all .15s}
.tab.active{background:#FFFFFF;color:#1D3557;box-shadow:0 1px 3px rgba(0,0,0,.12);font-weight:600}

/* Upload */
.upload-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.upload-box{background:#FFFFFF;border:1px solid #E2E8F0;border-radius:10px;padding:20px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.upload-zone{border:2px dashed #CBD5E1;border-radius:8px;padding:30px 16px;cursor:pointer;transition:all .2s;margin:12px 0;background:#FAFBFC}
.upload-zone:hover{border-color:#457B9D;background:#EFF6FF}
.upload-icon{font-size:28px;margin-bottom:8px}
.upload-label{font-size:12px;font-weight:600;margin-bottom:4px;color:#1A2332}
.upload-sub{font-size:11px;color:#64748B}
input[type=file]{display:none}

/* Recon stats */
.recon-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.recon-stat{background:#FFFFFF;border:1px solid #E2E8F0;border-radius:8px;padding:14px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.recon-val{font-size:26px;font-weight:700;font-family:'Courier New',monospace;color:#1A2332}
.recon-lbl{font-size:10px;color:#64748B;margin-top:3px;text-transform:uppercase;letter-spacing:.06em}

/* Chat */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 155px);background:#FFFFFF;border:1px solid #E2E8F0;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.chat-msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;background:#F8FAFC}
.bubble{max-width:78%;padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.6}
.bubble.user{background:#1D4ED8;color:#fff;align-self:flex-end;border-bottom-right-radius:3px}
.bubble.ai{background:#FFFFFF;border:1px solid #E2E8F0;color:#1A2332;align-self:flex-start;border-bottom-left-radius:3px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.chat-chips{display:flex;flex-wrap:wrap;gap:7px;padding:0 20px 12px;background:#FFFFFF}
.chip{padding:5px 11px;background:#F1F5F9;border:1px solid #E2E8F0;border-radius:20px;font-size:11px;color:#475569;cursor:pointer;transition:all .15s}
.chip:hover{border-color:#457B9D;color:#1D3557;background:#EFF6FF}
.chat-input-row{display:flex;gap:8px;padding:14px;border-top:1px solid #E2E8F0;background:#FFFFFF}
.chat-input{flex:1;background:#F8FAFC;border:1px solid #CBD5E1;border-radius:8px;padding:9px 14px;font-size:13px;color:#1A2332;font-family:inherit;outline:none}
.chat-input:focus{border-color:#457B9D;background:#fff}

/* Bar chart */
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:160px;padding:0 4px}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%}
.bar-col{width:100%;border-radius:4px 4px 0 0;min-height:2px;transition:height .4s ease}
.bar-label{font-size:10px;color:#64748B;text-align:center;word-break:break-all}
.bar-val{font-size:9px;color:#94A3B8;font-family:'Courier New',monospace}

/* Pie legend */
.pie-legend{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.pie-row{display:flex;align-items:center;gap:8px;font-size:12px}
.pie-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.pie-name{color:#64748B;flex:1}
.pie-pct{color:#1A2332;font-weight:600;font-family:'Courier New',monospace}

/* Ageing bar */
.age-bar-wrap{margin-bottom:12px}
.age-bar-top{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;color:#374151}
.age-bar-bg{height:7px;background:#E2E8F0;border-radius:4px;overflow:hidden}
.age-bar-fill{height:100%;border-radius:4px;transition:width .5s ease}

/* Misc */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.section-title{font-size:15px;font-weight:700;color:#1A2332}
.section-sub{font-size:11px;color:#64748B;margin-top:2px}
.empty{text-align:center;padding:50px 20px;color:#94A3B8;font-size:13px}
.empty-icon{font-size:40px;margin-bottom:10px;opacity:.4}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;gap:10px;color:#64748B;font-size:13px}
.spinner{width:16px;height:16px;border:2px solid #E2E8F0;border-top-color:#457B9D;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.notif{position:fixed;bottom:20px;right:20px;background:#FFFFFF;border:1px solid #E2E8F0;border-radius:8px;padding:12px 16px;font-size:13px;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:999;animation:slideup .3s ease;color:#1A2332}
@keyframes slideup{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.flex{display:flex}.gap-2{gap:8px}.mb-3{margin-bottom:12px}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px}

/* Dashboard filter bar */
.filter-bar{display:flex;align-items:center;gap:10px;background:#FFFFFF;border:1px solid #E2E8F0;border-radius:10px;padding:12px 16px;margin-bottom:20px;flex-wrap:wrap;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.filter-label{font-size:11px;font-weight:600;color:#64748B;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.filter-select{background:#F8FAFC;border:1px solid #CBD5E1;border-radius:6px;padding:6px 10px;font-size:12px;color:#1A2332;font-family:inherit;outline:none;cursor:pointer;min-width:160px}
.filter-select:focus{border-color:#457B9D}
.filter-divider{width:1px;height:20px;background:#E2E8F0;margin:0 4px}
.mis-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.mis-card{background:#FFFFFF;border:1px solid #E2E8F0;border-radius:8px;padding:14px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.mis-val{font-size:18px;font-weight:700;font-family:"Courier New",monospace;margin-bottom:4px;color:#1A2332}
.mis-lbl{font-size:10px;color:#64748B;text-transform:uppercase;letter-spacing:.06em}
.rate-wrap{margin-top:8px}.rate-bar-bg{height:5px;background:#E2E8F0;border-radius:4px;overflow:hidden;margin-top:4px}
.rate-bar-fill{height:100%;border-radius:4px;transition:width .6s ease}
.drill-panel{background:#FFFFFF;border:1px solid #E2E8F0;border-radius:10px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.drill-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.drill-kpi{background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:12px}
.drill-kpi-lbl{font-size:10px;color:#64748B;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.drill-kpi-val{font-size:15px;font-weight:700;font-family:"Courier New",monospace;color:#1A2332}
.cf-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.cf-card{background:#FFFFFF;border:1px solid #E2E8F0;border-radius:8px;padding:16px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.cf-val{font-size:20px;font-weight:700;font-family:"Courier New",monospace;color:#1A2332}
.cf-lbl{font-size:10px;color:#64748B;text-transform:uppercase;letter-spacing:.06em;margin-top:4px}
.net-pos{color:#3fb950}.net-neg{color:#f85149}.net-zero{color:#484f58}
.alert-box{border-radius:8px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:flex-start;gap:10px;font-size:12.5px}
.alert-red{background:#FEF2F2;border:1px solid #FECACA;color:#DC2626}
.alert-amber{background:#FFFBEB;border:1px solid #FDE68A;color:#D97706}
.alert-green{background:#F0FDF4;border:1px solid #BBF7D0;color:#16A34A}
.alert-icon{font-size:16px;flex-shrink:0}
.dash-section{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#94A3B8;margin:20px 0 12px;display:flex;align-items:center;gap:8px}
.dash-section::after{content:"";flex:1;height:1px;background:#E2E8F0}
.forecast-table{width:100%;border-collapse:collapse}
.forecast-table th{background:#F8FAFC;padding:8px 12px;text-align:left;font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#64748B;border-bottom:1px solid #E2E8F0}
.forecast-table td{padding:9px 12px;font-size:12px;color:#374151;border-bottom:1px solid #F1F5F9;font-family:"Courier New",monospace}
.forecast-table tr:hover td{background:#F8FAFC;color:#1A2332}

/* Mail modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:#FFFFFF;border:1px solid #E2E8F0;border-radius:12px;padding:24px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:14px;font-weight:700;margin-bottom:4px;color:#1A2332}
.modal-sub{font-size:11px;color:#64748B;margin-bottom:20px}
.modal-label{font-size:11px;font-weight:600;color:#64748B;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;display:block}
.modal-input{width:100%;background:#F8FAFC;border:1px solid #CBD5E1;border-radius:6px;padding:8px 12px;font-size:13px;color:#1A2332;font-family:inherit;outline:none;margin-bottom:12px}
.modal-input:focus{border-color:#457B9D}
.modal-textarea{width:100%;background:#F8FAFC;border:1px solid #CBD5E1;border-radius:6px;padding:8px 12px;font-size:12px;color:#374151;font-family:'Courier New',monospace;outline:none;resize:vertical;min-height:180px;margin-bottom:12px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}
.modal-badge{background:#F1F5F9;border:1px solid #E2E8F0;border-radius:20px;padding:3px 10px;font-size:11px;color:#64748B;display:inline-flex;align-items:center;gap:5px}

/* Party filter bar inside pages */
.page-filter{display:flex;align-items:center;gap:10px;background:#FFFFFF;border:1px solid #E2E8F0;border-radius:8px;padding:10px 14px;margin-bottom:16px;flex-wrap:wrap;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.pf-label{font-size:11px;font-weight:600;color:#64748B;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.pf-select{background:#F8FAFC;border:1px solid #CBD5E1;border-radius:6px;padding:5px 9px;font-size:12px;color:#1A2332;font-family:inherit;outline:none;min-width:150px}
.pf-select:focus{border-color:#457B9D}

/* Action buttons in table */
.btn-dl{background:#EFF6FF;border:1px solid #BFDBFE;color:#1D4ED8;border-radius:6px;padding:4px 9px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit}
.btn-dl:hover{background:#DBEAFE}
.btn-mail{background:#F0FDF4;border:1px solid #BBF7D0;color:#16A34A;border-radius:6px;padding:4px 9px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit}
.btn-mail:hover{background:#DCFCE7}

/* Email preview box */
.email-preview{background:#F8FAFC;border:1px solid #E2E8F0;border-radius:6px;padding:12px;font-family:'Courier New',monospace;font-size:11px;color:#374151;white-space:pre-wrap;max-height:280px;overflow-y:auto;line-height:1.6}
</style>
</head>
<body>

<div id="sidebar">
  <div class="logo">
    <div class="logo-title"><div class="logo-icon">💹</div>FinanceAI</div>
    <div class="logo-sub">MIS Intelligence Platform</div>
  </div>
  <nav id="nav"></nav>
  <div class="sidebar-foot">v1.0 · AED · Finance Admin</div>
</div>

<div id="main">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="page-title">Finance Dashboard</div>
      <div class="topbar-sub" id="page-date"></div>
    </div>
    <div class="topbar-right">
      <span style="font-size:11px;color:#484f58">Admin</span>
      <div class="avatar">FA</div>
    </div>
  </div>
  <div class="content">
    <div id="page-dashboard" class="page active"></div>
    <div id="page-ap" class="page"></div>
    <div id="page-ar" class="page"></div>
    <div id="page-reconciliation" class="page"></div>
    <div id="page-reports" class="page"></div>
    <div id="page-upload" class="page"></div>
    <div id="page-ai" class="page"></div>
  </div>
</div>

<div id="notif-area"></div>

<script>
const API = 'http://localhost:8000/api';
const fmt = n => n==null?'—':Number(n).toLocaleString('en-AE',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtK = n => Number(n)>=1000?(Number(n)/1000).toFixed(1)+'K':Number(n).toFixed(0);
const esc = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

async function api(path, opts={}) {
  try {
    const r = await fetch(API+path, opts);
    if(!r.ok) throw new Error(await r.text());
    return await r.json();
  } catch(e) { console.error(path,e); return null; }
}

async function dl(path, filename) {
  try {
    const r = await fetch(API+path);
    const b = await r.blob();
    const u = URL.createObjectURL(b);
    const a = document.createElement('a');
    a.href=u; a.download=filename; a.click();
    URL.revokeObjectURL(u);
  } catch(e) { notify('Download failed: '+e.message,'error'); }
}

function notify(msg, type='info') {
  const icons={success:'✅',error:'❌',info:'ℹ️'};
  const el = document.createElement('div');
  el.className='notif';
  el.innerHTML=`<span>${icons[type]||'ℹ️'}</span><span>${esc(msg)}</span>`;
  document.getElementById('notif-area').appendChild(el);
  setTimeout(()=>el.remove(),3500);
}

function badge(s) {
  const m={matched:'green',unmatched:'red',discrepancy:'amber',overdue:'red',
    due:'amber',upcoming:'green',processed:'green',pending:'amber',
    failed:'red','0-30':'green','31-60':'amber','61-90':'red','90+':'purple'};
  return `<span class="badge badge-${m[s]||'blue'}">${esc(s)}</span>`;
}

function spin() { return `<div class="loading"><div class="spinner"></div>Loading…</div>`; }
function empty(icon,msg) { return `<div class="empty"><div class="empty-icon">${icon}</div>${esc(msg)}</div>`; }

function buildTable(cols, rows, emptyMsg='No data found') {
  if(!rows||rows.length===0) return empty('📋',emptyMsg);
  return `<table><thead><tr>${cols.map(c=>`<th>${esc(c.label)}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td class="${c.cls||''}">${c.fn?c.fn(r):esc(r[c.key]??'—')}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
}

function barChart(data,lk,vk,cols) {
  if(!data||!data.length) return empty('📊','No chart data — upload files first');
  const max=Math.max(...data.map(d=>d[vk]||0),1);
  const c=cols||['#1f6feb','#2ea043','#d29922','#f85149','#bc8cff','#06b0d4'];
  return `<div class="bar-chart">${data.map((d,i)=>{
    const pct=Math.round((d[vk]/max)*100);
    return `<div class="bar-wrap"><div class="bar-val">${fmtK(d[vk]||0)}</div>
      <div class="bar-col" style="height:${pct}%;background:${c[i%c.length]}"></div>
      <div class="bar-label">${esc(d[lk])}</div></div>`;
  }).join('')}</div>`;
}

function pieChart(data,lk,vk) {
  if(!data||!data.length) return empty('🥧','No data');
  const c=['#58a6ff','#3fb950','#d29922','#f85149','#bc8cff','#06b0d4'];
  const total=data.reduce((s,d)=>s+(d[vk]||0),0)||1;
  return `<div class="pie-legend">${data.map((d,i)=>`<div class="pie-row">
    <div class="pie-dot" style="background:${c[i%c.length]}"></div>
    <span class="pie-name">${esc(d[lk])}</span>
    <span class="pie-pct">${Math.round((d[vk]/total)*100)}%</span>
  </div>`).join('')}</div>`;
}

function buildNav() {
  const secs=[...new Set(NAV.map(n=>n.sec))];
  document.getElementById('nav').innerHTML=secs.map(s=>`
    <div class="nav-section">${s}</div>
    ${NAV.filter(n=>n.sec===s).map(n=>`
      <div class="nav-item" data-page="${n.id}" onclick="goTo('${n.id}')">
        <span class="nav-icon">${n.icon}</span>${n.label}

function goTo(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelector(`[data-page="${id}"]`).classList.add('active');
  document.getElementById('page-title').textContent=TITLES[id];
  loadPage(id);
}

function renderForecast(forecast) {
  if(!forecast.length) return empty('📅','No forecast data available');
  return `<div style="overflow-x:auto"><table class="forecast-table">
    <thead><tr>
      <th>Month</th><th>Cash Out (AP Due)</th><th>Cash In (AR Expected)</th><th>Net</th><th>Position</th>
    </tr></thead>
    <tbody>${forecast.map(r=>{
      const net=r.net||0;
      const cls=net>0?'net-pos':net<0?'net-neg':'net-zero';
      const bar=Math.min(Math.abs(net)/Math.max(r.cash_in,r.cash_out,1)*100,100);
      return `<tr>
        <td style="color:#e6edf3;font-weight:600">${r.month}</td>
        <td style="color:#f85149">AED ${fmt(r.cash_out)}</td>
        <td style="color:#3fb950">AED ${fmt(r.cash_in)}</td>
        <td class="${cls}">AED ${fmt(net)}</td>
        <td><div style="background:#21262d;border-radius:3px;height:6px;width:80px;overflow:hidden">
          <div style="height:100%;width:${bar}%;background:${net>=0?'#3fb950':'#f85149'};border-radius:3px"></div>
        </div></td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

function renderStackedBars(trend) {
  if(!trend||!trend.length) return empty('📊','No trend data available');
  const maxVal = Math.max(...trend.map(t=>Math.max(t.payables||0,t.receivables||0)),1);
  return `<div style="display:flex;align-items:flex-end;gap:8px;height:160px;overflow-x:auto;padding-bottom:4px">
    ${trend.map(t=>{
      const apH=Math.round(((t.payables||0)/maxVal)*120);
      const arH=Math.round(((t.receivables||0)/maxVal)*120);
      return `<div style="display:flex;gap:3px;align-items:flex-end;flex-shrink:0">
        <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
          <div style="width:14px;height:${apH}px;background:#f85149;border-radius:3px 3px 0 0;min-height:2px" title="AP: AED ${fmt(t.payables)}"></div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
          <div style="width:14px;height:${arH}px;background:#3fb950;border-radius:3px 3px 0 0;min-height:2px" title="AR: AED ${fmt(t.receivables)}"></div>
        </div>
      </div>`;
    }).join('')}
  </div>
  <div style="display:flex;gap:16px;margin-top:10px;font-size:11px;color:#8b949e">
    <div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;background:#f85149;border-radius:2px"></div>Payables</div>
    <div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;background:#3fb950;border-radius:2px"></div>Receivables</div>
  </div>
  <div style="display:flex;gap:8px;margin-top:6px;overflow-x:auto">
    ${trend.map(t=>`<div style="font-size:9px;color:#484f58;width:31px;text-align:center;flex-shrink:0">${t.month.slice(5)}</div>`).join('')}
  </div>`;
}

let reconType='ap', reconData=null, reconParties=[];

async function loadReconciliation() {
  const el=document.getElementById('page-reconciliation');
  const [vendors,customers]=await Promise.all([api('/dashboard/vendors'),api('/dashboard/customers')]);
  reconParties={vendors:vendors||[],customers:customers||[]};
  el.innerHTML=buildReconShell();
}

function buildReconShell() {
  const parties = reconType==='ap' ? (reconParties.vendors||[]) : (reconParties.customers||[]);
  return `
    <div class="section-header">
      <div><div class="section-title">Reconciliation</div><div class="section-sub">ERP vs SOA matching with party-wise analysis &amp; export</div></div>
      <div class="flex gap-2">
        <button class="btn btn-blue btn-sm" id="run-btn" onclick="runRecon()">▶ Run Reconciliation</button>
      </div>
    </div>

    <div class="tabs">
      <div class="tab ${reconType==='ap'?'active':''}" onclick="setReconType(this,'ap')">AP Reconciliation</div>
      <div class="tab ${reconType==='ar'?'active':''}" onclick="setReconType(this,'ar')">AR Reconciliation</div>
    </div>

    <!-- Party + export filter bar -->
    <div class="page-filter">
      <span class="pf-label">Filter by ${reconType==='ap'?'Vendor':'Customer'}</span>
      <select class="pf-select" id="recon-party-sel" onchange="filterReconByParty(this.value)">
        <option value="">All Parties</option>
        ${parties.map(p=>`<option value="${esc(p)}">${esc(p)}</option>`).join('')}
      </select>
      <div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-outline btn-sm" onclick="dl('/reports/reconciliation/'+reconType,'recon_'+reconType+'.xlsx')">⬇ Excel (All)</button>
        <button class="btn-dl" onclick="dlReconByParty()">⬇ Party Statement</button>
        <button class="btn-mail" onclick="mailReconParty()">✉ Mail Party</button>
      </div>
    </div>

    <div id="recon-body">
      <div class="card" style="text-align:center;padding:50px">
        <div style="font-size:40px;margin-bottom:12px">⚖️</div>
        <div style="font-size:13px;color:#8b949e">Click "Run Reconciliation" to match ERP vs SOA records</div>
        <div style="font-size:11px;color:#484f58;margin-top:6px">Upload both a ledger and SOA file first</div>
      </div>
    </div>`;
}

function setReconType(el,type) {
  reconType=type; reconData=null;
  document.getElementById('page-reconciliation').innerHTML=buildReconShell();
}

async function runRecon() {
  document.getElementById('recon-body').innerHTML=spin();
  const data=await api('/reconciliation/run/'+reconType,{method:'POST'});
  reconData=data;
  showReconResults(data,'all','');
}

function filterReconByParty(party) {
  if(!reconData) return;
  showReconResults(reconData,'all',party);
}

function showReconResults(data,filter,party) {
  if(!data){document.getElementById('recon-body').innerHTML=empty('❌','Reconciliation failed. Check API.');return;}
  let items=(data.items||[]);
  if(party) items=items.filter(r=>r.party_name===party);
  if(filter!=='all') items=items.filter(r=>r.status===filter);

  const partyTotal=items.reduce((s,r)=>s+(r.erp_amount||0),0);
  const partyOutstanding=items.filter(r=>r.status!=='matched').reduce((s,r)=>s+(r.erp_amount||0),0);
  const rc=data.match_rate>90?'#3fb950':data.match_rate>70?'#d29922':'#f85149';

  document.getElementById('recon-body').innerHTML=`
    <div class="recon-stats">
      <div class="recon-stat"><div class="recon-val">${data.total_records}</div><div class="recon-lbl">Total Records</div></div>
      <div class="recon-stat"><div class="recon-val" style="color:#3fb950">${data.matched}</div><div class="recon-lbl">Matched</div></div>
      <div class="recon-stat"><div class="recon-val" style="color:#d29922">${data.discrepancies}</div><div class="recon-lbl">Discrepancies</div></div>
      <div class="recon-stat"><div class="recon-val" style="color:#f85149">${data.unmatched}</div><div class="recon-lbl">Unmatched</div></div>
    </div>
    <div style="background:#0d1117;border-radius:8px;padding:10px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div>
        <span style="font-size:13px;color:#8b949e">Match Rate: </span>
        <span style="font-family:'Courier New';font-weight:700;font-size:20px;color:${rc}">${data.match_rate}%</span>
      </div>
      ${party?`<div style="font-size:12px;color:#8b949e">
        Showing: <strong style="color:#e6edf3">${esc(party)}</strong> &nbsp;|&nbsp;
        Total: <span class="mono">AED ${fmt(partyTotal)}</span> &nbsp;|&nbsp;
        Outstanding: <span class="mono" style="color:#d29922">AED ${fmt(partyOutstanding)}</span>
      </div>`:''}
    </div>
    <div class="tbl-wrap">
      <div class="tbl-head">
        <div class="flex gap-2" style="flex-wrap:wrap">
          ${['all','matched','unmatched','discrepancy'].map(f=>`<button class="btn btn-sm ${filter===f?'btn-blue':'btn-outline'}" onclick="showReconResults(reconData,'${f}',document.getElementById('recon-party-sel')?.value||'')">${f}</button>`).join('')}
        </div>
        <span style="font-size:11px;color:#484f58">${items.length} records shown</span>
      </div>
      <table>
        <thead><tr>
          <th>Party</th><th>Invoice No</th>
          <th>ERP Amount</th><th>SOA Amount</th>
          <th>Difference</th><th>Fine / Adj.</th><th>Status</th>
        </tr></thead>
        <tbody>
          ${items.map(r=>`<tr>
            <td><strong style="color:#e6edf3">${esc(r.party_name)}</strong></td>
            <td class="mono">${esc(r.invoice_no)}</td>
            <td class="mono">${r.erp_amount!=null?`AED ${fmt(r.erp_amount)}`:'—'}</td>
            <td class="mono">${r.soa_amount!=null?`AED ${fmt(r.soa_amount)}`:'—'}</td>
            <td class="mono" style="color:${r.difference&&r.difference!==0?'#d29922':'#484f58'}">
              ${r.difference!=null&&r.difference!==0?`AED ${fmt(r.difference)}`:'—'}
            </td>
            <td class="mono" style="color:#f85149">
              ${r.difference&&Math.abs(r.difference)>0?`AED ${fmt(Math.abs(r.difference))}`:'—'}
            </td>
            <td>${badge(r.status)}</td>
          </tr>`).join('')}
          ${!items.length?`<tr><td colspan="7">${empty('🔍','No records match this filter.')}</td></tr>`:''}
        </tbody>
      </table>
    </div>`;
}

    <div class="upload-grid">

        {l:'Customer Ledger',i:'🏢',t:'customer-ledger',e:'customer-ledger',h:'Customer Name, Invoice No, Invoice Date, Amount'},
        {l:'Statement of Account',i:'📄',t:'soa',e:'soa',h:'Party Name, Invoice No, Amount'},
      ].map(z=>`<div class="upload-box">

          <div class="upload-sub">${z.h}</div>

      </div>`).join('')}
    </div>

        {key:'filename',label:'File',fn:r=>`<span style="color:#e6edf3;font-weight:500">${esc(r.filename)}</span>`},

function dropFile(e,t,ep) {
  e.preventDefault();
  e.currentTarget.style.borderColor='#30363d';
  const f=e.dataTransfer.files[0];
  if(f) uploadFile(f,t,ep);
}

function doUpload(input,t,ep) {
  if(input.files[0]) uploadFile(input.files[0],t,ep);
}

async function uploadFile(file,t,ep) {
  const st=document.getElementById('st-'+t);
  if(st) st.innerHTML=`<div class="loading" style="padding:4px 0"><div class="spinner"></div>Uploading…</div>`;
  const fd=new FormData();
  fd.append('file',file);
  let url=`${API}/upload/${ep}`;
  if(ep==='soa'){
    const pt=prompt('Is this SOA for "vendor" or "customer"?','vendor');
    if(!pt){ if(st) st.textContent=''; return; }
    url+=`?party_type=${pt.trim().toLowerCase()}`;
  }
  try {
    const r=await fetch(url,{method:'POST',body:fd});
    // Read raw text first so we can debug if JSON parse fails
    const raw=await r.text();
    let data={};
    try { data=JSON.parse(raw); } catch(_){ data={}; }

    if(!r.ok){
      const errMsg=data.detail||raw||`HTTP ${r.status}`;
      if(st) st.textContent=`❌ ${errMsg}`;
      notify(`Upload error: ${errMsg}`,'error');
      return;
    }

    const rows=data.rows_imported??data.row_count??'?';
    if(st) st.textContent=`✅ ${rows} rows imported successfully`;
    notify(`✅ ${file.name} — ${rows} rows imported`,'success');
    setTimeout(()=>loadUpload(),800);
  } catch(e) {
    if(st) st.textContent=`❌ Network error: ${e.message}`;
    notify('Upload failed — check backend is running on port 8000','error');
  }
}

// ── AI CHAT ───────────────────────────────────────────────────────
const SUGGESTIONS=['Total payable this month','Top overdue customers','AR ageing breakdown','Finance summary','Upcoming payments due','Vendor summary'];
let chatLog=[{role:'ai',text:"Hello! I'm your Finance AI assistant. Ask me anything about your AP/AR data."}];

function loadAI() {
  document.getElementById('page-ai').innerHTML=`
    <div class="section-header mb-3">
      <div><div class="section-title">AI Finance Assistant</div><div class="section-sub">Natural language queries on your financial data</div></div>
    </div>
    <div class="chat-wrap">
      <div class="chat-msgs" id="chat-msgs"></div>
      <div class="chat-chips">${SUGGESTIONS.map(s=>`<div class="chip" onclick="sendChat('${s}')">${s}</div>`).join('')}</div>
      <div class="chat-input-row">
        <input class="chat-input" id="chat-in" placeholder="Ask about payables, receivables, ageing…" onkeydown="if(event.key==='Enter')sendChat()">
        <button class="btn btn-primary" onclick="sendChat()">Send</button>
      </div>
    </div>`;
  renderChat();
}

function renderChat() {
  const el=document.getElementById('chat-msgs');
  if(!el)return;
  el.innerHTML=chatLog.map(m=>`<div class="bubble ${m.role}">${esc(m.text)}</div>`).join('');
  el.scrollTop=el.scrollHeight;
}

async function sendChat(q) {
  const input=document.getElementById('chat-in');
  const query=q||(input?.value?.trim());
  if(!query)return;
  if(input)input.value='';
  chatLog.push({role:'user',text:query});
  chatLog.push({role:'ai',text:'⏳ Analyzing your data…'});
  renderChat();
  const data=await api('/ai/query',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query})});
  chatLog.pop();
  chatLog.push({role:'ai',text:data?.answer||'Sorry, I could not process that. Make sure data is uploaded and the backend is running.'});
  renderChat();
}

// ── TABS HELPER ───────────────────────────────────────────────────
function switchTab(el, show, hide, pageId) {
  const container = pageId
    ? document.getElementById('page-'+pageId)
    : el.closest('.page') || el.parentElement;
  container.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(show).style.display='block';
  document.getElementById(hide).style.display='none';
}

function dlPartyStatement(type, party) {

async function openMailModal(party, partyType, dept) {
  // First preview the email
  const preview = await api(`/mail/preview?party_name=${encodeURIComponent(party)}&party_type=${partyType}`);

  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'mail-modal';
  modal.innerHTML = `
    <div class="modal-box">
      <div class="modal-title">✉ Send Mail to ${esc(party)}</div>
      <div class="modal-sub">
        <span class="modal-badge">📋 ${partyType.toUpperCase()}</span>
        <span class="modal-badge" style="margin-left:4px">CC: ${dept} Department</span>
        <span class="modal-badge" style="margin-left:4px">${preview?.invoice_count||0} invoices</span>
      </div>

      <label class="modal-label">Subject</label>
      <input class="modal-input" id="mail-subject" value="${esc(preview?.subject||'')}">

      <label class="modal-label">Custom Message (prepended to statement)</label>
      <input class="modal-input" id="mail-custom" placeholder="Optional note to the party…">

      <label class="modal-label">Email Preview (auto-generated from invoice data)</label>
      <div class="email-preview" id="mail-preview-body">${esc(preview?.body||'Loading…')}</div>

      <div class="modal-footer">
        <button class="btn btn-outline" onclick="document.getElementById('mail-modal').remove()">Cancel</button>
        <button class="btn btn-primary" onclick="sendMail('${esc(party)}','${partyType}','${dept}')">📨 Send Mail</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  // Close on overlay click
  modal.addEventListener('click', e=>{ if(e.target===modal) modal.remove(); });
}

async function sendMail(party, partyType, dept) {
  const subject = document.getElementById('mail-subject')?.value||'';
  const custom = document.getElementById('mail-custom')?.value||'';

  const res = await api('/mail/send', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      party_name: party,
      party_type: partyType,
      cc_department: dept,
      subject,
      custom_message: custom
    })
  });

  document.getElementById('mail-modal')?.remove();

  if(res && res.status==='simulated') {
    notify(`✅ Mail prepared for ${party} (${res.invoice_count} invoices). ${res.message}`, 'success');
  } else {
    notify('Mail sending failed. Check backend.', 'error');
  }
}

    reports:loadReports,upload:loadUpload,ai:loadAI})[id]?.();
